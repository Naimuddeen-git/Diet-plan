<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fat Loss Diet Plan Creator – High Protein</title>
<meta name="description" content="Create a personalized fat-loss diet plan using gym-based high-protein meals. Enter your details and get a 7-day plan instantly.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Vercel Speed Insights -->
<script type="module">
  import { injectSpeedInsights } from 'https://unpkg.com/@vercel/speed-insights@2.0.0/dist/index.mjs';
  injectSpeedInsights();
</script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #222639;
    --border: #2e3250;
    --accent: #22c55e;
    --accent2: #16a34a;
    --accent-glow: rgba(34,197,94,0.18);
    --text: #f0f4ff;
    --muted: #8892b0;
    --danger: #f97316;
    --info: #38bdf8;
    --card: #1e2235;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(34,197,94,0.07) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 100%, rgba(56,189,248,0.05) 0%, transparent 60%);
  }
  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(34,197,94,0.06) 0%, transparent 100%);
  }
  .logo { font-size: 2rem; margin-bottom: .3rem; }
  header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); font-size: .92rem; margin-top: .4rem; }

  .container { max-width: 840px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  /* ── FORM ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .form-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--accent); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
  @media(max-width:580px){ .grid { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: .5rem; }
  .field label { font-size: .82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .field input, .field select {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: .72rem 1rem;
    color: var(--text);
    font-family: inherit;
    font-size: .95rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .field select option { background: var(--surface2); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 12px;
    padding: .9rem 2rem; font-size: 1rem; font-weight: 700;
    cursor: pointer; width: 100%; margin-top: 1.8rem;
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(34,197,94,0.3);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(34,197,94,0.45); }
  .btn:active { transform: translateY(0); }
  .btn-outline {
    background: transparent; border: 1.5px solid var(--accent);
    color: var(--accent); margin-top: .8rem;
    box-shadow: none;
  }
  .btn-outline:hover { background: var(--accent-glow); box-shadow: none; }

  /* ── RESULTS ── */
  #results { margin-top: 2.5rem; animation: fadeUp .5s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .summary-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem; margin-bottom: 2rem;
  }
  .stat {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 1rem 1.2rem; text-align: center;
  }
  .stat .val { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
  .stat .lbl { font-size: .76rem; color: var(--muted); margin-top: .2rem; text-transform: uppercase; letter-spacing: .04em; }

  .water-card {
    background: linear-gradient(135deg, rgba(56,189,248,0.12), rgba(56,189,248,0.04));
    border: 1px solid rgba(56,189,248,0.3);
    border-radius: 14px; padding: 1rem 1.4rem;
    display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;
    font-size: .95rem;
  }
  .water-card .icon { font-size: 1.8rem; }
  .water-card strong { color: var(--info); }

  .section-title {
    font-size: 1rem; font-weight: 700; margin-bottom: 1rem; margin-top: 1.8rem;
    display: flex; align-items: center; gap: .5rem; color: var(--text);
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .week-grid { display: grid; grid-template-columns: 1fr; gap: 1.1rem; }

  .day-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; transition: box-shadow .2s;
  }
  .day-card:hover { box-shadow: 0 4px 24px rgba(34,197,94,0.1); }
  .day-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .85rem 1.2rem;
    background: linear-gradient(90deg, rgba(34,197,94,0.1), transparent);
    border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .day-header .day-name { font-weight: 700; font-size: .95rem; }
  .day-header .day-cal { font-size: .82rem; color: var(--muted); }
  .day-header .chevron { color: var(--muted); transition: transform .25s; font-size: .9rem; }
  .day-card.open .chevron { transform: rotate(180deg); }

  .day-body {
    display: none; padding: 1.1rem 1.2rem;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .9rem;
  }
  @media(max-width:580px){ .day-body { grid-template-columns: 1fr; } }
  .meal { background: var(--surface2); border-radius: 10px; padding: .8rem 1rem; }
  .meal-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
  .meal-label.b { color: #fb923c; }
  .meal-label.l { color: #a78bfa; }
  .meal-label.d { color: #38bdf8; }
  .meal-name { font-size: .9rem; font-weight: 600; margin-bottom: .25rem; }
  .meal-desc { font-size: .78rem; color: var(--muted); line-height: 1.5; }
  .meal-cal { font-size: .75rem; font-weight: 700; color: var(--accent); margin-top: .4rem; }

  .tip-card {
    margin-top: 2rem;
    background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(34,197,94,0.02));
    border: 1px solid rgba(34,197,94,0.25); border-radius: 14px; padding: 1.2rem 1.4rem;
  }
  .tip-card h3 { font-size: .9rem; font-weight: 700; color: var(--accent); margin-bottom: .7rem; }
  .tip-card ul { list-style: none; display: flex; flex-direction: column; gap: .4rem; }
  .tip-card li { font-size: .85rem; color: var(--muted); display: flex; gap: .5rem; }
  .tip-card li::before { content: '✦'; color: var(--accent); flex-shrink: 0; }

  .actions { display: flex; flex-direction: column; gap: 0; }
</style>
</head>
<body>

<header>
  <div class="logo">🥗</div>
  <h1>Fat Loss <span>Diet Plan</span> Creator</h1>
  <p>Personalized 7-day high-protein meal plan · Calorie-smart · 100% browser-based</p>
</header>

<div class="container">
  <div class="form-card">
    <h2>📋 Your Details</h2>
    <div class="grid">
      <div class="field">
        <label>Age (years)</label>
        <input type="number" id="age" min="10" max="100" placeholder="e.g. 30">
      </div>
      <div class="field">
        <label>Weight (kg)</label>
        <input type="number" id="weight" min="30" max="300" placeholder="e.g. 75">
      </div>
      <div class="field">
        <label>Height (cm)</label>
        <input type="number" id="height" min="100" max="250" placeholder="e.g. 170">
      </div>
      <div class="field">
        <label>Gender</label>
        <select id="gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
      <div class="field">
        <label>Activity Level</label>
        <select id="activity">
          <option value="1.2">Sedentary (desk job, no exercise)</option>
          <option value="1.375">Lightly Active (1–3 days/week)</option>
          <option value="1.55">Moderately Active (3–5 days/week)</option>
          <option value="1.725">Very Active (6–7 days/week)</option>
          <option value="1.9">Athlete / Hard training</option>
        </select>
      </div>
      <div class="field">
        <label>Food Preference</label>
        <select id="pref">
          <option value="veg">Vegetarian</option>
          <option value="nonveg">Non-Vegetarian</option>
          <option value="mixed">Both / Mixed</option>
        </select>
      </div>
      <div class="field">
        <label>Goal Speed</label>
        <select id="goal">
          <option value="0.25">Gentle (–0.25 kg/week)</option>
          <option value="0.5" selected>Moderate (–0.5 kg/week)</option>
          <option value="0.75">Fast (–0.75 kg/week)</option>
          <option value="1">Aggressive (–1 kg/week)</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button class="btn" onclick="generatePlan()">🌿 Generate My Diet Plan</button>
    </div>
  </div>

  <div id="results" style="display:none"></div>
</div>

<script>
// ─── Gym-Based Protein Meal Database ───────────────────────────────────────────────────
const meals = {
  veg: {
    breakfast: [
      { name: "Protein Oats & Whey", desc: "Rolled oats with 1 scoop whey protein, chia seeds, and berries", cal: 350 },
      { name: "Greek Yogurt Parfait", desc: "Low-fat Greek yogurt layered with protein granola and mixed nuts", cal: 300 },
      { name: "Tofu Scramble", desc: "Scrambled firm tofu with spinach, bell peppers, and nutritional yeast", cal: 280 },
      { name: "Protein Pancakes", desc: "Pancakes made with whey protein, oat flour, and egg replacer", cal: 320 },
      { name: "Cottage Cheese Bowl", desc: "Low-fat cottage cheese topped with pineapple and pumpkin seeds", cal: 250 },
      { name: "Protein Smoothie", desc: "Smoothie with soy milk, protein powder, spinach, and half banana", cal: 290 },
      { name: "Seitan Breakfast Wrap", desc: "Whole wheat wrap with seasoned seitan strips and veggies", cal: 340 },
    ],
    lunch: [
      { name: "Lentil & Quinoa Bowl", desc: "Quinoa, boiled lentils, roasted chickpeas, and tahini dressing", cal: 450 },
      { name: "Edamame & Tofu Salad", desc: "Mixed greens with edamame beans, baked tofu, and vinaigrette", cal: 400 },
      { name: "Tempeh Stir-Fry", desc: "Marinated tempeh chunks stir-fried with broccoli and brown rice", cal: 480 },
      { name: "Protein Pasta", desc: "Chickpea or lentil pasta with marinara and soy mince", cal: 420 },
      { name: "High-Protein Veggie Burger", desc: "Plant-based protein patty on a whole grain bun with side salad", cal: 460 },
      { name: "Black Bean & Corn Bowl", desc: "Black beans, sweet corn, brown rice, and avocado slices", cal: 430 },
      { name: "Soya Chunk Curry", desc: "High-protein soya chunks in a tomato-based gravy with quinoa", cal: 410 },
    ],
    dinner: [
      { name: "Grilled Tofu Steaks", desc: "Thick firm tofu slices grilled with asparagus and sweet potato mash", cal: 380 },
      { name: "Zucchini Noodles & Veg Meatballs", desc: "Zoodles topped with plant-based meatballs and light sauce", cal: 320 },
      { name: "Roasted Chickpea Salad", desc: "Large salad bowl with crispy roasted chickpeas, hemp seeds", cal: 340 },
      { name: "Protein-Packed Minestrone", desc: "Thick vegetable soup with kidney beans, lentils, and edamame", cal: 300 },
      { name: "Seitan Stir-Fry", desc: "Stir-fried seitan with mixed greens and a touch of soy sauce", cal: 350 },
      { name: "Broccoli & Cottage Cheese Bake", desc: "Baked broccoli florets mixed with low-fat cottage cheese", cal: 280 },
      { name: "Lentil Loaf Slice", desc: "A slice of baked lentil and vegetable loaf with steamed beans", cal: 330 },
    ],
  },
  nonveg: {
    breakfast: [
      { name: "Egg White Omelette", desc: "Omelette made with 4 egg whites, 1 whole egg, spinach, and mushrooms", cal: 280 },
      { name: "Protein Oats & Eggs", desc: "Small bowl of oats plus 3 boiled egg whites on the side", cal: 320 },
      { name: "Chicken Sausage Wrap", desc: "Lean chicken sausage with scrambled egg whites in a whole grain wrap", cal: 350 },
      { name: "Turkey Bacon & Toast", desc: "2 slices of turkey bacon, 2 poached eggs, and 1 slice whole wheat toast", cal: 310 },
      { name: "Smoked Salmon Bagel", desc: "Half a whole grain bagel with light cream cheese and smoked salmon", cal: 340 },
      { name: "Steak & Eggs", desc: "Small portion of lean sirloin steak with 2 sunny-side-up eggs", cal: 390 },
      { name: "Whey Smoothie & Boiled Eggs", desc: "1 scoop whey in water alongside 2 hard-boiled eggs", cal: 260 },
    ],
    lunch: [
      { name: "Grilled Chicken Breast & Rice", desc: "150g grilled chicken breast with a side of brown rice and broccoli", cal: 450 },
      { name: "Tuna Salad Bowl", desc: "Chunk light tuna mixed with Greek yogurt, over a bed of mixed greens", cal: 380 },
      { name: "Lean Beef Mince & Quinoa", desc: "Extra lean ground beef cooked with tomatoes served over quinoa", cal: 480 },
      { name: "Turkey Meatballs & Pasta", desc: "Lean turkey meatballs with whole wheat pasta and light marinara", cal: 460 },
      { name: "Grilled Salmon Asparagus", desc: "Grilled salmon fillet with roasted asparagus and a small sweet potato", cal: 490 },
      { name: "Chicken Fajita Bowl", desc: "Sliced chicken breast with bell peppers, onions, and black beans", cal: 430 },
      { name: "White Fish & Couscous", desc: "Baked cod or tilapia with steamed green beans and whole wheat couscous", cal: 410 },
    ],
    dinner: [
      { name: "Baked Chicken & Veggies", desc: "Oven-baked chicken breast with zucchini and bell peppers", cal: 350 },
      { name: "Shrimp Stir-Fry", desc: "High-protein shrimp stir-fried with snow peas, broccoli, and soy sauce", cal: 310 },
      { name: "Lean Steak Salad", desc: "Sliced flank steak over arugula, cherry tomatoes, and balsamic glaze", cal: 380 },
      { name: "Turkey Burger Patties", desc: "Two lean turkey patties (no bun) with a large side salad", cal: 360 },
      { name: "Grilled Mahi-Mahi", desc: "Grilled white fish with roasted Brussels sprouts", cal: 320 },
      { name: "Chicken & Cauliflower Rice", desc: "Diced grilled chicken mixed with low-carb cauliflower rice", cal: 290 },
      { name: "Pork Tenderloin & Greens", desc: "Roasted lean pork tenderloin with steamed spinach", cal: 340 },
    ],
  },
};

// Build mixed from combined
meals.mixed = {
  breakfast: shuffle([...meals.veg.breakfast, ...meals.nonveg.breakfast]),
  lunch: shuffle([...meals.veg.lunch, ...meals.nonveg.lunch]),
  dinner: shuffle([...meals.veg.dinner, ...meals.nonveg.dinner]),
};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

function calcBMR(gender, weight, height, age) {
  if (gender === "male") return 10 * weight + 6.25 * height - 5 * age + 5;
  return 10 * weight + 6.25 * height - 5 * age - 161;
}

function generatePlan() {
  const age    = parseInt(document.getElementById('age').value);
  const weight = parseFloat(document.getElementById('weight').value);
  const height = parseFloat(document.getElementById('height').value);
  const gender = document.getElementById('gender').value;
  const act    = parseFloat(document.getElementById('activity').value);
  const pref   = document.getElementById('pref').value;
  const goalKg = parseFloat(document.getElementById('goal').value);

  // Validation
  if (!age || !weight || !height || age < 10 || weight < 30 || height < 100) {
    alert("Please fill in all fields with valid values.");
    return;
  }

  const bmr    = calcBMR(gender, weight, height, age);
  const tdee   = Math.round(bmr * act);
  const deficit = Math.round(goalKg * 7700 / 7); // cal deficit per day
  const target  = Math.max(1200, tdee - deficit);
  const water   = Math.max(2.0, +(weight * 0.033 + 0.5).toFixed(1));
  const bmi     = +(weight / ((height / 100) ** 2)).toFixed(1);

  // Select 7 unique meals per slot
  const db = meals[pref];
  const picks = { b: [], l: [], d: [] };
  ['breakfast','lunch','dinner'].forEach((slot, si) => {
    const key = ['b','l','d'][si];
    const pool = shuffle([...db[slot]]);
    for (let i = 0; i < 7; i++) picks[key].push(pool[i % pool.length]);
  });

  // Scale meal calories to fit target
  // Typical split: B 25%, L 40%, D 30%, snacks 5%
  const splits = { b: 0.25, l: 0.40, d: 0.30 };

  // Build HTML
  let daysHTML = '';
  DAYS.forEach((day, i) => {
    const bCal = Math.round(target * splits.b);
    const lCal = Math.round(target * splits.l);
    const dCal = Math.round(target * splits.d);
    const totalDay = bCal + lCal + dCal;

    daysHTML += `
    <div class="day-card" id="day${i}">
      <div class="day-header" onclick="toggleDay(${i})">
        <span class="day-name">📅 ${day}</span>
        <span class="day-cal">~${totalDay} kcal</span>
        <span class="chevron">▼</span>
      </div>
      <div class="day-body">
        <div class="meal">
          <div class="meal-label b">🌅 Breakfast</div>
          <div class="meal-name">${picks.b[i].name}</div>
          <div class="meal-desc">${picks.b[i].desc}</div>
          <div class="meal-cal">~${bCal} kcal</div>
        </div>
        <div class="meal">
          <div class="meal-label l">☀️ Lunch</div>
          <div class="meal-name">${picks.l[i].name}</div>
          <div class="meal-desc">${picks.l[i].desc}</div>
          <div class="meal-cal">~${lCal} kcal</div>
        </div>
        <div class="meal">
          <div class="meal-label d">🌙 Dinner</div>
          <div class="meal-name">${picks.d[i].name}</div>
          <div class="meal-desc">${picks.d[i].desc}</div>
          <div class="meal-cal">~${dCal} kcal</div>
        </div>
      </div>
    </div>`;
  });

  const resultsHTML = `
    <div class="summary-bar">
      <div class="stat"><div class="val">${target}</div><div class="lbl">Daily kcal</div></div>
      <div class="stat"><div class="val">${tdee}</div><div class="lbl">Maintenance</div></div>
      <div class="stat"><div class="val">${deficit}</div><div class="lbl">Deficit/day</div></div>
      <div class="stat"><div class="val">${bmi}</div><div class="lbl">Your BMI</div></div>
      <div class="stat"><div class="val">${goalKg} kg</div><div class="lbl">Weekly Loss</div></div>
    </div>

    <div class="water-card">
      <span class="icon">💧</span>
      <div>Drink <strong>${water} litres</strong> of water daily. Sip consistently — aim for a glass every 1–1.5 hours throughout the day.</div>
    </div>

    <div class="section-title">7-Day High-Protein Gym-Based Meal Plan</div>
    <div class="week-grid">${daysHTML}</div>

    <div class="tip-card">
      <h3>💡 Fat-Loss Tips</h3>
      <ul>
        <li>Prioritize hitting your daily protein target to preserve muscle mass.</li>
        <li>Weigh your food raw when tracking to ensure calorie accuracy.</li>
        <li>Stay hydrated during your workouts and throughout the day.</li>
        <li>Incorporate strength training 3-5 times a week for best results.</li>
        <li>Ensure you get 7-8 hours of quality sleep for muscle recovery.</li>
        <li>Use low-calorie condiments like mustard, hot sauce, and spices.</li>
        <li>This plan is a guide — adjust portions based on your macros and hunger.</li>
      </ul>
    </div>

    <div class="actions">
      <button class="btn btn-outline" onclick="generatePlan()">🔄 Regenerate Plan</button>
      <button class="btn btn-outline" onclick="scrollToForm()" style="margin-top:.6rem">✏️ Change My Details</button>
    </div>
  `;

  const el = document.getElementById('results');
  el.innerHTML = resultsHTML;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleDay(i) {
  const card = document.getElementById('day' + i);
  card.classList.toggle('open');
}

function scrollToForm() {
  document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
